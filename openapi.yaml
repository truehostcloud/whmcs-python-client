openapi: 3.0.3
info:
  title: WHMCS API
  version: 1.0.0
  description: |
    Python client for the WHMCS API.

    WHMCS (Web Host Manager Complete Solution) provides a single API endpoint that handles
    multiple operations through different 'action' parameters. This specification presents
    each action as an independent path while routing all requests to the /api.php endpoint.

servers:
  - url: https://your-whmcs-instance.com/includes
    description: WHMCS API server

paths:
  /api.php?action=AddClient:
    post:
      summary: Add a new client
      description: Creates a new client account in WHMCS
      operationId: addClient
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/WHMCSBaseRequest'
                - $ref: '#/components/schemas/AddClientRequest'
      responses:
        '200':
          description: Client created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddClientResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=UpdateClient:
    post:
      summary: Update client details
      description: Modifies an existing client's information
      operationId: updateClient
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/WHMCSBaseRequest'
                - $ref: '#/components/schemas/UpdateClientRequest'
      responses:
        '200':
          description: Client updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateClientResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=AddOrder:
    post:
      summary: Create a new order
      description: Places a new order for products/services
      operationId: addOrder
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/WHMCSBaseRequest'
                - $ref: '#/components/schemas/AddOrderRequest'
      responses:
        '200':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddOrderResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=CancelOrder:
    post:
      summary: Cancel a pending order
      description: Cancels an order that is still pending
      operationId: cancelOrder
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/WHMCSBaseRequest'
                - $ref: '#/components/schemas/CancelOrderRequest'
      responses:
        '200':
          description: Order cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelOrderResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=DeleteOrder:
    post:
      summary: Delete an order
      description: Permanently deletes a cancelled or fraud order
      operationId: deleteOrder
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/WHMCSBaseRequest'
                - $ref: '#/components/schemas/DeleteOrderRequest'
      responses:
        '200':
          description: Order deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteOrderResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=GetClientsDomains:
    post:
      summary: Get client domains
      description: Obtain the domains associated with a client
      operationId: getClientsDomains
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/WHMCSBaseRequest'
                - $ref: '#/components/schemas/GetClientsDomainsRequest'
      responses:
        '200':
          description: Domains retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetClientsDomainsResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=DomainGetNameservers:
    post:
      summary: Get domain nameservers
      description: Obtain the current nameservers for a domain
      operationId: domainGetNameservers
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/WHMCSBaseRequest'
                - $ref: '#/components/schemas/DomainGetNameserversRequest'
      responses:
        '200':
          description: Nameservers retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainGetNameserversResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=DomainUpdateNameservers:
    post:
      summary: Update domain nameservers
      description: Sends the save nameservers command to the registrar for the domain
      operationId: domainUpdateNameservers
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/WHMCSBaseRequest'
                - $ref: '#/components/schemas/DomainUpdateNameserversRequest'
      responses:
        '200':
          description: Nameservers updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainUpdateNameserversResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=DomainWhois:
    post:
      summary: Lookup domain WHOIS
      description: Retrieve domain whois information
      operationId: domainWhois
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/WHMCSBaseRequest'
                - $ref: '#/components/schemas/DomainWhoisRequest'
      responses:
        '200':
          description: WHOIS lookup completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DomainWhoisResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=AffiliateActivate:
    post:
      summary: Activate affiliate status
      description: Activate affiliate referrals for a client
      operationId: affiliateActivate
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/WHMCSBaseRequest'
                - $ref: '#/components/schemas/AffiliateActivateRequest'
      responses:
        '200':
          description: Affiliate activated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AffiliateActivateResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=GetAffiliates:
    post:
      summary: Get affiliates
      description: Obtain an array of affiliates
      operationId: getAffiliates
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/WHMCSBaseRequest'
                - $ref: '#/components/schemas/GetAffiliatesRequest'
      responses:
        '200':
          description: Affiliates retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAffiliatesResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=GetPaymentMethods:
    post:
      summary: Get payment methods
      description: Retrieve activated payment methods
      operationId: getPaymentMethods
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/WHMCSBaseRequest'
      responses:
        '200':
          description: Payment methods retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaymentMethodsResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=GetTLDPricing:
    post:
      summary: Get TLD pricing
      description: Retrieve TLD pricing
      operationId: getTldPricing
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/WHMCSBaseRequest'
                - $ref: '#/components/schemas/GetTLDPricingRequest'
      responses:
        '200':
          description: TLD pricing retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTLDPricingResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=GetTransactions:
    post:
      summary: Get transactions
      description: Obtain transactions matching the passed criteria
      operationId: getTransactions
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/WHMCSBaseRequest'
                - $ref: '#/components/schemas/GetTransactionsRequest'
      responses:
        '200':
          description: Transactions retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTransactionsResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=GetOrders:
    post:
      summary: Get orders
      description: Obtain orders matching the passed criteria
      operationId: getOrders
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/WHMCSBaseRequest'
                - $ref: '#/components/schemas/GetOrdersRequest'
      responses:
        '200':
          description: Orders retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetOrdersResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=GetClients:
    post:
      summary: Get clients
      description: Obtain the clients that match passed criteria
      operationId: getClients
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/WHMCSBaseRequest'
                - $ref: '#/components/schemas/GetClientsRequest'
      responses:
        '200':
          description: Clients retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetClientsResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=GetCurrencies:
    post:
      summary: Get currencies
      description: Obtain the currencies configured in the system
      operationId: getCurrencies
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/WHMCSBaseRequest'
      responses:
        '200':
          description: Currencies retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCurrenciesResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=GetInvoices:
    post:
      summary: Get invoices
      description: Retrieve a list of invoices matching the provided criteria
      operationId: getInvoices
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/WHMCSBaseRequest'
                - $ref: '#/components/schemas/GetInvoicesRequest'
      responses:
        '200':
          description: Invoices retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetInvoicesResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=GetClientsDetails:
    post:
      summary: Get client details
      description: Obtain detailed information for a specific client
      operationId: getClientsDetails
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/WHMCSBaseRequest'
                - $ref: '#/components/schemas/GetClientsDetailsRequest'
      responses:
        '200':
          description: Client details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetClientsDetailsResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=GetClientsProducts:
    post:
      summary: Get client products
      description: Obtain a list of client purchased products matching the criteria
      operationId: getClientsProducts
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/WHMCSBaseRequest'
                - $ref: '#/components/schemas/GetClientsProductsRequest'
      responses:
        '200':
          description: Client products retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetClientsProductsResponse'
        default:
          $ref: '#/components/responses/Error'

  /api.php?action=GetInvoicesDetails:
    post:
      summary: Get invoices with line item details
      description: Custom action returning invoices in GetInvoice format with embedded line items
      operationId: getInvoicesDetails
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              allOf:
                - $ref: '#/components/schemas/WHMCSBaseRequest'
                - $ref: '#/components/schemas/GetInvoicesDetailsRequest'
      responses:
        '200':
          description: Invoices with line items retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetInvoicesDetailsResponse'
        default:
          $ref: '#/components/responses/Error'

components:
  schemas:
    WHMCSBaseRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Admin username/API identifier
        password:
          type: string
          description: Admin password/API secret
        accesskey:
          type: string
          description: Optional API access key
        responsetype:
          type: string
          enum: [json, xml]
          default: json
          description: Response format

    AddClientRequest:
      type: object
      required:
        - firstname
        - lastname
        - email
        - address1
        - city
        - state
        - postcode
        - country
        - phonenumber
      properties:
        owner_user_id:
          type: integer
          description: The ID of the user that should own the client
        firstname:
          type: string
          description: First name of the client
        lastname:
          type: string
          description: Last name of the client
        companyname:
          type: string
          description: Company name
        email:
          type: string
          description: Email address of the client
        address1:
          type: string
          description: Address line 1
        address2:
          type: string
          description: Address line 2
        city:
          type: string
          description: City
        state:
          type: string
          description: State
        postcode:
          type: string
          description: Postal code
        country:
          type: string
          description: 2 character ISO country code
        phonenumber:
          type: string
          description: Phone number
        tax_id:
          type: string
          description: Client's tax ID
        password2:
          type: string
          description: Password for the new user account
        securityqid:
          type: integer
          description: Security question ID
        securityqans:
          type: string
          description: Security question answer
        currency:
          type: integer
          description: Currency ID
        groupid:
          type: integer
          description: Client group ID
        customfields:
          type: string
          description: Base64 encoded serialized array of custom field values
        language:
          type: string
          description: Default language setting
        clientip:
          type: string
          description: Originating IP address
        notes:
          type: string
          description: Admin only notes
        marketingoptin:
          type: boolean
          description: Opt-in to marketing emails
        noemail:
          type: boolean
          description: Set to true to suppress the Order Confirmation email being sent
        skipvalidation:
          type: boolean
          description: Ignore required field validation

    UpdateClientRequest:
      type: object
      required:
        - clientid
      properties:
        clientid:
          type: integer
          description: The ID of the client to update
        clientemail:
          type: string
          description: The email address of the client to update
        firstname:
          type: string
          description: First name of the client
        lastname:
          type: string
          description: Last name of the client
        companyname:
          type: string
          description: Company name
        email:
          type: string
          description: Email address of the client
        address1:
          type: string
          description: Address line 1
        address2:
          type: string
          description: Address line 2
        city:
          type: string
          description: City
        state:
          type: string
          description: State
        postcode:
          type: string
          description: Postal code
        country:
          type: string
          description: 2 character ISO country code
        phonenumber:
          type: string
          description: Phone number
        tax_id:
          type: string
          description: Client's tax ID
        password2:
          type: string
          description: Password for the new user account
        securityqid:
          type: integer
          description: Security question ID
        securityqans:
          type: string
          description: Security question answer
        currency:
          type: integer
          description: Currency ID
        groupid:
          type: integer
          description: Client group ID
        customfields:
          type: string
          description: Base64 encoded serialized array of custom field values
        language:
          type: string
          description: Default language setting
        clientip:
          type: string
          description: Originating IP address
        notes:
          type: string
          description: Admin only notes
        status:
          type: string
          description: The status (e.g., Active)
        paymentmethod:
          type: string
          description: The payment method for the order in the system format (e.g., paypal, mailin)
        email_preferences_general:
          type: boolean
          description: Receive general emails
        email_preferences_product:
          type: boolean
          description: Receive product emails
        email_preferences_domain:
          type: boolean
          description: Receive domain emails
        email_preferences_invoice:
          type: boolean
          description: Receive invoice emails
        email_preferences_support:
          type: boolean
          description: Receive support emails
        email_preferences_affiliate:
          type: boolean
          description: Receive affiliate emails
        clearcreditcard:
          type: boolean
          description: Clear stored credit card details
        latefeeoveride:
          type: boolean
          description: Override Late Fees setting
        overideduenotices:
          type: boolean
          description: Override Overdue Notices setting
        taxexempt:
          type: boolean
          description: Exempt from tax collections
        separateinvoices:
          type: boolean
          description: Group items into one invoice
        disableautocc:
          type: boolean
          description: Enable/disable automatic credit card processing
        overrideautoclose:
          type: boolean
          description: Enable/disable automatic account closure

    AddOrderRequest:
      type: object
      required:
        - clientid
        - paymentmethod
      properties:
        clientid:
          type: integer
          description: The ID of the client to add the order for
        clientemail:
          type: string
          description: The email address of the client to update
        paymentmethod:
          type: string
          description: The payment method for the order in the system format (e.g., paypal, mailin)
        pid:
          type: array
          items:
            type: integer
          description: Array of product IDs to add to the order
        qty:
          type: array
          items:
            type: integer
          description: Array of product quantities
        domain:
          type: array
          items:
            type: string
          description: Array of domain names associated with the products/domains
        billingcycle:
          type: array
          items:
            type: string
          description: Array of billing cycles for the products
        domaintype:
          type: array
          items:
            type: string
          description: For domain registrations, array of register or transfer values
        regperiod:
          type: array
          items:
            type: integer
            minimum: 1
            maximum: 10
          description: For domain registrations, the registration periods for the domains
        idnlanguage:
          type: array
          items:
            type: string
          description: For IDN domain registrations, the language codes for the domains
        eppcode:
          type: array
          items:
            type: string
          description: For domain transfers, the EPP codes for the domains being transferred
        nameserver1:
          type: string
          description: The first nameserver to apply to all domains in the order
        nameserver2:
          type: string
          description: The second nameserver to apply to all domains in the order
        nameserver3:
          type: string
          description: The third nameserver to apply to all domains in the order
        nameserver4:
          type: string
          description: The fourth nameserver to apply to all domains in the order
        nameserver5:
          type: string
          description: The fifth nameserver to apply to all domains in the order
        configoptions:
          type: array
          items:
            type: string
          description: Array of base64 encoded serialized array of product configurable options values
        priceoverride:
          type: array
          items:
            type: number
            format: float
          description: Override the price of the product being ordered
        promocode:
          type: string
          description: The promotion code to apply to the order
        promooverride:
          type: boolean
          description: Should the promotion apply to the order even without matching promotional products
        affid:
          type: integer
          description: The affiliate ID to associate with the order
        noinvoice:
          type: boolean
          description: Set to true to suppress the invoice generating for the whole order
        noinvoiceemail:
          type: boolean
          description: Set to true to suppress the Invoice Created email being sent for the order
        addons:
          type: array
          items:
            type: string
          description: Array of comma separated lists of addons to create on order with the products
        addonsqty:
          type: array
          items:
            type: string
          description: Array of comma-separated lists of quantities for addons associated with products
        hostname:
          type: array
          items:
            type: string
          description: Array of hostnames for VPS/Dedicated Server orders
        ns1prefix:
          type: array
          items:
            type: string
          description: Array of first nameserver prefixes for VPS/Dedicated servers (e.g., ns1 in ns1.hostname.com)
        ns2prefix:
          type: array
          items:
            type: string
          description: Array of second nameserver prefixes for VPS/Dedicated servers (e.g., ns2 in ns2.hostname.com)
        rootpw:
          type: array
          items:
            type: string
          description: Array of desired root passwords for VPS/Dedicated servers
        contactid:
          type: integer
          description: The ID of the contact, associated with the client, that should apply to all domains in the order
        dnsmanagement:
          type: array
          items:
            type: boolean
          description: Add DNS Management to the Domain Order
        domainfields:
          type: array
          items:
            type: string
          description: Array of base64 encoded serialized array of TLD Specific Field Values
        emailforwarding:
          type: array
          items:
            type: boolean
          description: Add Email Forwarding to the Domain Order
        idprotection:
          type: array
          items:
            type: boolean
          description: Add ID Protection to the Domain Order
        domainpriceoverride:
          type: array
          items:
            type: number
            format: float
          description: Override the price of the registration price on the domain being ordered
        domainrenewoverride:
          type: array
          items:
            type: number
            format: float
          description: Override the price of the renewal price on the domain being ordered
        domainrenewals:
          type: object
          additionalProperties:
            type: integer
          description: A name -> value object of domainName -> renewalPeriod renewals to add an order for
        addonid:
          type: integer
          description: The Addon ID for an Addon Only Order
        addonidqty:
          type: integer
          description: The quantity of addons in an addon-only order
        serviceid:
          type: integer
          description: The service ID for the addon only order
        addonids:
          type: array
          items:
            type: integer
          description: Array of addon IDs for an Addon Only Order
        addonidsqty:
          type: array
          items:
            type: integer
          description: Array of quantities for an addon-only order
        serviceids:
          type: array
          items:
            type: integer
          description: Array of service IDs to associate the addons for an Addon Only order
        servicerenewals:
          type: array
          items:
            type: integer
          description: Array of service IDs to be on-demand renewed
        addonrenewals:
          type: array
          items:
            type: integer
          description: Array of service addon IDs to be on-demand renewed

    CancelOrderRequest:
      type: object
      required:
        - orderid
      properties:
        orderid:
          type: integer
          description: The ID of the pending order
        cancelsub:
          type: boolean
          description: Attempt to cancel the subscription associated with the products
        noemail:
          type: boolean
          description: Set to true to stop the invoice payment email being sent if the invoice becomes paid

    DeleteOrderRequest:
      type: object
      required:
        - orderid
      properties:
        orderid:
          type: integer
          description: The order to be deleted

    GetClientsDomainsRequest:
      type: object
      properties:
        limitstart:
          type: integer
          description: The offset for the returned log data
          default: 0
        limitnum:
          type: integer
          description: The number of records to return
          default: 25
        clientid:
          type: integer
          description: The client id to obtain the details for
        domainid:
          type: integer
          description: The specific domain id to obtain the details for
        domain:
          type: string
          description: The specific domain to obtain the details for

    DomainGetNameserversRequest:
      type: object
      required:
        - domainid
      properties:
        domainid:
          type: integer
          description: The id of the domain to obtain the nameservers for

    DomainUpdateNameserversRequest:
      type: object
